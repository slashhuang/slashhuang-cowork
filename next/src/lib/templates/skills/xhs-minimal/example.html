<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>极简白底 - 小红书排版</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body style="margin: 0; padding: 0; background: #ECECEC; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
  <div style="width: 1080px; height: 1440px; background: #FFFFFF; padding: 48px; box-sizing: border-box; font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif; display: flex; flex-direction: column;">
    <!-- 标题 -->
    <h1 style="font-size: 34px; font-weight: 700; color: #000000; line-height: 1.5; margin: 0 0 32px 0; letter-spacing: 0.5px;">
      关于独处的一些思考
    </h1>

    <!-- 分隔线 -->
    <div style="width: 100%; height: 1px; background: #EEEEEE; margin-bottom: 40px;"></div>

    <!-- 正文 -->
    <p style="font-size: 24px; color: #333333; line-height: 1.7; margin: 0 0 24px 0; font-weight: 400;">
      独处不是孤独，而是一种能力。在这个信息爆炸的时代，我们每天都在被各种声音包围，却很少有时间听到自己的声音。
    </p>

    <p style="font-size: 24px; color: #333333; line-height: 1.7; margin: 0 0 24px 0; font-weight: 400;">
      试着每天留出二十分钟，关掉手机，远离屏幕，只是安静地坐着。你会发现，那些一直困扰你的问题，在安静中往往能找到答案。
    </p>

    <p style="font-size: 24px; color: #333333; line-height: 1.7; margin: 0 0 24px 0; font-weight: 400;">
      独处的时候，你不是一个人——你和全世界最重要的那个人在一起：你自己。
    </p>

    <p style="font-size: 24px; color: #333333; line-height: 1.7; margin: 0 0 24px 0; font-weight: 400;">
      不必急于社交，不必害怕安静。真正成熟的人，懂得在热闹中保持清醒，在独处中获得力量。
    </p>

    <p style="font-size: 24px; color: #333333; line-height: 1.7; margin: 0 0 48px 0; font-weight: 400;">
      愿你既能融入人群，也能享受独处。
    </p>

    <!-- 底部 -->
    <div style="margin-top: auto; font-size: 16px; color: #CCCCCC; letter-spacing: 2px;">
      — 深夜随笔
    </div>
  </div>
</body>
</html>
