<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大字报 - 小红书排版</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&family=Noto+Serif+SC:wght@700&display=swap" rel="stylesheet">
</head>
<body style="margin: 0; padding: 0; background: #ECECEC; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
  <div style="width: 1080px; height: 1440px; background: #FAF8F5; padding: 80px 60px; box-sizing: border-box; font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif; display: flex; flex-direction: column; justify-content: center;">
    <!-- 标签 -->
    <div style="font-size: 16px; color: #999; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 64px;">
      观点 · 思考
    </div>

    <!-- 标题 -->
    <h1 style="font-size: 64px; font-weight: 900; color: #1A1A1A; line-height: 1.3; margin: 0 0 56px 0; letter-spacing: -1px;">
      别把时间浪费在<br>讨好所有人上
    </h1>

    <!-- 高亮金句 -->
    <div style="background: #FF6B6B; color: #FFFFFF; padding: 24px 32px; border-radius: 4px; font-size: 28px; font-weight: 700; line-height: 1.6; margin: 0 0 56px 0;">
      你只需要让对的人看到，就够了。
    </div>

    <!-- 正文 -->
    <p style="font-size: 26px; color: #4A4A4A; line-height: 1.8; margin: 0 0 24px 0;">
      很多人花大量精力去迎合别人的期待，结果发现，那些真正重要的人，反而被你忽略了。
    </p>
    <p style="font-size: 26px; color: #4A4A4A; line-height: 1.8; margin: 0;">
      把注意力留给值得的事，把真诚留给懂你的人。
    </p>

    <!-- 底部装饰线 -->
    <div style="width: 48px; height: 4px; background: #FF6B6B; margin-top: auto; padding-top: 80px;"></div>
  </div>
</body>
</html>
