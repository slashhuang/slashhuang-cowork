<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大字标题 - 公众号封面</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body style="margin: 0; padding: 0; background: #ECECEC; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
  <div style="width: 900px; height: 383px; background: #1A1A2E; padding: 40px 48px; box-sizing: border-box; font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; position: relative; overflow: hidden;">
    <!-- 背景装饰 -->
    <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(180deg, rgba(26,26,46,1) 0%, rgba(22,33,62,1) 100%);"></div>

    <!-- 内容层 -->
    <div style="position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center;">
      <!-- 超大标题 -->
      <h1 style="font-size: 56px; font-weight: 900; color: #FFFFFF; line-height: 1.2; margin: 0 0 20px 0; letter-spacing: 2px;">
        搞钱，要趁早
      </h1>

      <!-- 副标题 -->
      <p style="font-size: 18px; color: rgba(255,255,255,0.6); line-height: 1.5; margin: 0; letter-spacing: 1px;">
        给年轻人的第一个理财指南
      </p>
    </div>

    <!-- 装饰点 -->
    <div style="position: absolute; top: 24px; right: 32px; width: 8px; height: 8px; border-radius: 50%; background: #FF6B6B;"></div>
    <div style="position: absolute; bottom: 24px; left: 32px; width: 6px; height: 6px; border-radius: 50%; background: #4D96FF;"></div>
  </div>
</body>
</html>
