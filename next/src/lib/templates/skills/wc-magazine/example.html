<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>杂志风 - 公众号封面</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">
</head>
<body style="margin: 0; padding: 0; background: #ECECEC; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
  <div style="width: 900px; height: 383px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 40px 48px; box-sizing: border-box; font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif; position: relative; overflow: hidden;">
    <!-- 背景装饰 -->
    <div style="position: absolute; top: -40px; right: -40px; width: 200px; height: 200px; border-radius: 50%; background: rgba(255,255,255,0.08);"></div>
    <div style="position: absolute; bottom: -60px; left: -30px; width: 160px; height: 160px; border-radius: 50%; background: rgba(255,255,255,0.05);"></div>
    <div style="position: absolute; top: 20px; left: 60px; width: 2px; height: 40px; background: rgba(255,255,255,0.3);"></div>

    <!-- 分类标签 -->
    <div style="font-size: 12px; color: rgba(255,255,255,0.7); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 24px; position: relative; z-index: 1;">
      MAGAZINE · 精选阅读
    </div>

    <!-- 主标题 -->
    <h1 style="font-family: 'Noto Serif SC', serif; font-size: 36px; font-weight: 700; color: #FFFFFF; line-height: 1.3; margin: 0 0 16px 0; position: relative; z-index: 1;">
      2026年最值得关注的<br>十个科技趋势
    </h1>

    <!-- 摘要 -->
    <p style="font-size: 16px; color: rgba(255,255,255,0.85); line-height: 1.6; margin: 0; max-width: 600px; position: relative; z-index: 1;">
      从人工智能到量子计算，从太空探索到生物科技，这十大趋势将深刻改变我们的生活和工作方式。
    </p>

    <!-- 底部装饰线 -->
    <div style="position: absolute; bottom: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #FF6B6B, #FFD93D, #6BCB77, #4D96FF);"></div>
  </div>
</body>
</html>
