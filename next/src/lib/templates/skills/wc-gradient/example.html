<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>渐变背景 - 公众号封面</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body style="margin: 0; padding: 0; background: #ECECEC; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
  <div style="width: 900px; height: 383px; background: linear-gradient(135deg, #f093fb 0%, #f5576c 50%, #ffd200 100%); padding: 40px 48px; box-sizing: border-box; font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; position: relative; overflow: hidden;">
    <!-- 背景装饰圆圈 -->
    <div style="position: absolute; top: -30px; right: -30px; width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.15);"></div>
    <div style="position: absolute; bottom: -20px; left: 100px; width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,0.1);"></div>

    <!-- 内容层 -->
    <div style="position: relative; z-index: 1;">
      <!-- 标签 -->
      <div style="font-size: 12px; color: rgba(255,255,255,0.8); letter-spacing: 4px; margin-bottom: 20px;">
        HOT · 热门话题
      </div>

      <!-- 主标题 -->
      <h1 style="font-size: 40px; font-weight: 900; color: #FFFFFF; line-height: 1.3; margin: 0 0 16px 0; text-shadow: 0 2px 8px rgba(0,0,0,0.15);">
        生活需要仪式感
      </h1>

      <!-- 摘要 -->
      <p style="font-size: 16px; color: rgba(255,255,255,0.9); line-height: 1.5; margin: 0; max-width: 500px;">
        每一个平凡的日子，都值得被认真对待
      </p>
    </div>
  </div>
</body>
</html>
