<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>杂志卡片 - 小红书排版</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body style="margin: 0; padding: 0; background: #ECECEC; display: flex; justify-content: center; align-items: center; min-height: 100vh;">
  <div style="width: 1080px; height: 1440px; background: #FFFFFF; padding: 72px 64px; box-sizing: border-box; font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif; position: relative; overflow: hidden;">
    <!-- 装饰点阵背景 -->
    <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: radial-gradient(circle, #F0F0F0 1px, transparent 1px); background-size: 24px 24px; pointer-events: none; z-index: 0;"></div>

    <!-- 内容层 -->
    <div style="position: relative; z-index: 1;">
      <!-- 顶部装饰线 -->
      <div style="width: 100%; height: 2px; background: linear-gradient(90deg, #2C2C2C 0%, #2C2C2C 60%, transparent 100%); margin-bottom: 48px;"></div>

      <!-- 分类标签 -->
      <div style="font-size: 14px; color: #888; letter-spacing: 6px; margin-bottom: 32px;">
        DRY GOODS · 干货分享
      </div>

      <!-- 标题 (serif) -->
      <h1 style="font-family: 'Noto Serif SC', 'Source Han Serif SC', 'STSong', serif; font-size: 44px; font-weight: 700; color: #1A1A1A; line-height: 1.4; margin: 0 0 40px 0; letter-spacing: 1px;">
        如何高效学习<br>一门新技能
      </h1>

      <!-- 分隔线 -->
      <div style="width: 48px; height: 3px; background: #2C2C2C; margin-bottom: 40px;"></div>

      <!-- 正文段落 -->
      <p style="font-size: 22px; color: #4A4A4A; line-height: 1.9; margin: 0 0 24px 0; font-weight: 300;">
        学习新技能的关键不在于天赋，而在于方法。以下三个步骤可以帮助你快速入门并建立扎实的基础。
      </p>

      <p style="font-size: 22px; color: #4A4A4A; line-height: 1.9; margin: 0 0 24px 0; font-weight: 300;">
        <strong style="font-weight: 500; color: #1A1A1A;">第一步：建立知识框架</strong><br>
        先了解这个领域的全貌，找到核心概念和关键术语，建立自己的知识地图。
      </p>

      <p style="font-size: 22px; color: #4A4A4A; line-height: 1.9; margin: 0 0 24px 0; font-weight: 300;">
        <strong style="font-weight: 500; color: #1A1A1A;">第二步：刻意练习</strong><br>
        将大目标拆解为小任务，每天坚持练习，逐步提升难度。
      </p>

      <p style="font-size: 22px; color: #4A4A4A; line-height: 1.9; margin: 0 0 48px 0; font-weight: 300;">
        <strong style="font-weight: 500; color: #1A1A1A;">第三步：输出验证</strong><br>
        通过教别人或写总结来检验自己的理解程度。
      </p>

      <!-- 底部装饰 -->
      <div style="display: flex; align-items: center; gap: 16px;">
        <div style="width: 32px; height: 32px; border-radius: 50%; background: #2C2C2C;"></div>
        <div style="font-size: 16px; color: #888; letter-spacing: 2px;">收藏 · 反复阅读</div>
      </div>
    </div>
  </div>
</body>
</html>
